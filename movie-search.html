<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电影评分搜索</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #181819;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.15);
    --text: #e8e6e1;
    --muted: #7a7875;
    --accent: #d4a843;
    --accent-dim: rgba(212,168,67,0.12);
    --douban: #2dba4e;
    --imdb: #f5c518;
    --rt: #fa320a;
    --font-serif: 'Noto Serif SC', serif;
    --font-mono: 'DM Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-serif);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px 80px;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 640px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  .logo {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--accent);
    font-family: var(--font-mono);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1 {
    font-size: 32px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.2;
    color: var(--text);
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 10px;
    font-family: var(--font-mono);
    letter-spacing: 0.05em;
  }

  /* Search box */
  .search-area {
    position: relative;
    margin-bottom: 32px;
  }

  .search-inner {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    transition: border-color 0.2s;
    overflow: hidden;
  }

  .search-inner:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  #q {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    padding: 14px 18px;
    font-size: 15px;
    font-family: var(--font-serif);
    color: var(--text);
    caret-color: var(--accent);
  }

  #q::placeholder { color: var(--muted); }

  .search-btn {
    background: var(--accent);
    border: none;
    padding: 0 22px;
    cursor: pointer;
    font-size: 13px;
    font-family: var(--font-mono);
    font-weight: 500;
    color: #0e0e0f;
    letter-spacing: 0.05em;
    transition: opacity 0.15s;
    white-space: nowrap;
  }

  .search-btn:hover { opacity: 0.85; }
  .search-btn:active { opacity: 0.7; }

  /* Tips */
  .tip {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
    margin-top: 10px;
    padding: 0 2px;
  }

  /* Platform cards */
  .platforms {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .platform {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .platform::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--platform-color);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .platform:hover {
    border-color: var(--border-hover);
    background: #1d1d1e;
    transform: translateX(3px);
  }

  .platform:hover::after { opacity: 1; }

  .platform-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    background: var(--platform-dim);
    font-weight: 600;
    font-family: var(--font-mono);
    color: var(--platform-color);
    letter-spacing: -0.03em;
  }

  .platform-info { flex: 1; min-width: 0; }

  .platform-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
  }

  .platform-url {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: block;
  }

  .platform-arrow {
    font-size: 14px;
    color: var(--muted);
    flex-shrink: 0;
    transition: transform 0.15s, color 0.15s;
  }

  .platform:hover .platform-arrow {
    transform: translateX(3px);
    color: var(--platform-color);
  }

  /* All-open button */
  .open-all-wrap {
    margin-top: 20px;
    text-align: center;
  }

  .open-all-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 10px 28px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    font-family: var(--font-mono);
    letter-spacing: 0.08em;
    transition: border-color 0.15s, color 0.15s;
  }

  .open-all-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* History */
  .history {
    margin-bottom: 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }

  .history-label {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
    margin-right: 2px;
  }

  .history-tag {
    font-size: 11px;
    font-family: var(--font-mono);
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 3px 10px;
    border-radius: 20px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }

  .history-tag:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 40px 0;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 2;
    border: 1px dashed var(--border);
    border-radius: 6px;
  }

  .empty-icon {
    font-size: 32px;
    display: block;
    margin-bottom: 12px;
    filter: grayscale(1);
  }

  /* Footer */
  footer {
    position: relative;
    z-index: 1;
    margin-top: 60px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.05em;
  }

  @media (max-width: 480px) {
    h1 { font-size: 24px; }
    .platform { padding: 14px 16px; }
  }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <div class="logo">Movie · Rating · Search</div>
    <h1>电影<span>评分</span>搜索</h1>
    <p class="subtitle">Douban / IMDb / Rotten Tomatoes / Letterboxd</p>
  </header>

  <div class="search-area">
    <div class="search-inner">
      <input id="q" type="text" placeholder="输入电影名称，按 Enter 搜索…" autocomplete="off" />
      <button class="search-btn" onclick="doSearch()">搜　索</button>
    </div>
    <div class="tip">支持中文、英文片名 · 按 Enter 打开全部</div>
  </div>

  <div class="history" id="historyBox" style="display:none"></div>

  <div class="platforms" id="results">
    <div class="empty">
      <span class="empty-icon">🎬</span>
      输入电影名称<br>一键打开各平台搜索结果
    </div>
  </div>

  <div class="open-all-wrap" id="openAllWrap" style="display:none">
    <button class="open-all-btn" onclick="openAll()">↗ 同时打开全部平台</button>
  </div>

</div>

<footer>本工具直接跳转各平台搜索页 · 无需 API · 本地运行</footer>

<script>
const PLATFORMS = [
  {
    id: 'douban',
    name: 'Douban',
    color: '#2dba4e',
    dim: 'rgba(45,186,78,0.1)',
    icon: '豆',
    urlFn: q => `https://search.douban.com/movie/subject_search?search_text=${encodeURIComponent(q)}`,
    display: q => `search.douban.com/movie/subject_search?search_text=${q}`
  },
  {
    id: 'imdb',
    name: 'IMDb',
    color: '#f5c518',
    dim: 'rgba(245,197,24,0.1)',
    icon: 'IM',
    urlFn: q => `https://www.imdb.com/find/?q=${encodeURIComponent(q)}&s=tt&ttype=ft`,
    display: q => `imdb.com/find/?q=${q}`
  },
  {
    id: 'rt',
    name: 'Rotten Tomatoes',
    color: '#fa320a',
    dim: 'rgba(250,50,10,0.1)',
    icon: 'RT',
    urlFn: q => `https://www.rottentomatoes.com/search?search=${encodeURIComponent(q)}`,
    display: q => `rottentomatoes.com/search?search=${q}`
  },
  {
    id: 'letterboxd',
    name: 'Letterboxd',
    color: '#40bcf4',
    dim: 'rgba(64,188,244,0.1)',
    icon: 'Lb',
    urlFn: q => `https://letterboxd.com/search/${encodeURIComponent(q)}/`,
    display: q => `letterboxd.com/search/${q}/`
  },
  {
    id: 'metacritic',
    name: 'Metacritic',
    color: '#6dc132',
    dim: 'rgba(109,193,50,0.1)',
    icon: 'Mc',
    urlFn: q => `https://www.metacritic.com/search/${encodeURIComponent(q)}/?category=2`,
    display: q => `metacritic.com/search/${q}/?category=2`
  }
];

let currentUrls = [];
let history = JSON.parse(localStorage.getItem('mrsHistory') || '[]');

renderHistory();

document.getElementById('q').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

function doSearch() {
  const q = document.getElementById('q').value.trim();
  if (!q) return;
  addHistory(q);
  renderCards(q);
}

function renderCards(q) {
  currentUrls = PLATFORMS.map(p => p.urlFn(q));

  const container = document.getElementById('results');
  container.innerHTML = PLATFORMS.map((p, i) => `
    <a class="platform"
       href="${p.urlFn(q)}"
       target="_blank"
       rel="noopener"
       style="--platform-color:${p.color};--platform-dim:${p.dim}">
      <div class="platform-icon">${p.icon}</div>
      <div class="platform-info">
        <div class="platform-name">${p.name}</div>
        <span class="platform-url">${p.display(q)}</span>
      </div>
      <span class="platform-arrow">→</span>
    </a>
  `).join('');

  document.getElementById('openAllWrap').style.display = 'block';
}

function openAll() {
  currentUrls.forEach((url, i) => {
    setTimeout(() => window.open(url, '_blank'), i * 120);
  });
}

function addHistory(name) {
  history = [name, ...history.filter(h => h !== name)].slice(0, 8);
  localStorage.setItem('mrsHistory', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const box = document.getElementById('historyBox');
  if (history.length === 0) { box.style.display = 'none'; return; }
  box.style.display = 'flex';
  box.innerHTML = `<span class="history-label">历史：</span>` +
    history.map(h => `<button class="history-tag" onclick="quickSearch('${h.replace(/'/g,"\\'")}')">` + h + `</button>`).join('');
}

function quickSearch(name) {
  document.getElementById('q').value = name;
  doSearch();
}
</script>
</body>
</html>
